{% extends "base.html" %}

{% block title %}{{ post.title }} | Blog{% endblock %}

{% block body %}
  <main class="page-shell article-shell">
    <article class="article-card">
      <p class="eyebrow">Blog post</p>
      <h1>{{ post.title }}</h1>
      <p class="item-meta">{{ post.date }}</p>
      <p class="lede">{{ post.summary }}</p>
      <div class="article-body">
        {{ post.content_html | safe }}
      </div>
    </article>
  </main>
{% endblock %}
