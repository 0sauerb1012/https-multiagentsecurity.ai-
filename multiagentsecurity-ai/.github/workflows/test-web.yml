name: test-web

on:
  push:
    paths:
      - "apps/web/**"
      - ".github/workflows/test-web.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/test-web.yml"

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
