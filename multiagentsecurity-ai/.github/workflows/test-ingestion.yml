name: test-ingestion

on:
  push:
    paths:
      - "services/ingestion/**"
      - ".github/workflows/test-ingestion.yml"
  pull_request:
    paths:
      - "services/ingestion/**"
      - ".github/workflows/test-ingestion.yml"

jobs:
  ingestion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest
      - run: python -m compileall src
